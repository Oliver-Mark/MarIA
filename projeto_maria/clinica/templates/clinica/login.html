{% extends 'clinica/base.html' %}
{% load static %} 

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="flex min-h-screen bg-gray-50">
    
    <section id="carrosel" class="hidden md:block md:w-1/2 relative bg-black">
        <img src="{% static 'clinica/img/Tela Inicial.jpeg' %}" alt="Imagem inicial" class="w-full h-full object-cover">
    </section>

    <section id="login" class="w-full md:w-1/2 flex items-center justify-center flex-col p-8">
        <div class="flex justify-center mb-20">
            <img src="{% static 'clinica/img/Logo-Maria-preto.png' %}" alt="Logo MarIA" class="h-16 object-contain">
        </div>
        
        <div class="flex flex-col w-full max-w-md bg-white p-8 border-2 border-[#5DAAE0] rounded-2xl shadow-xl md:w-2/4 md:shadow-2xl md:bg-gray-100 md:border-2 md:border-[#5DAAE0]">       
            
            <h1 class="text-2xl font-bold text-gray-800 mb-4 flex justify-center drop-shadow-lg">Login</h1>
            <form method="POST" action="" class="space-y-5">
                {% csrf_token %} 
                
                <div>
                    <label class="block text-base font-bold text-gray-700 mb-2 drop-shadow-lg">Usuário</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="username" placeholder="Insira seu usuário ou email..." required autofocus
                            class="block w-full pl-10 pr-4 py-1 text-sm border-2 border-[#5DAAE0] rounded-full focus:ring-2 focus:ring-[#5DAAE0] focus:border-[#5DAAE0] outline-none transition-all placeholder:italic placeholder:text-sm">
                    </div>                    
                </div>
                
                <div>
                    <label class="block text-base font-bold text-gray-700 mb-2 drop-shadow-lg">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" name="password" placeholder="Insira sua senha aqui..." required
                            class="block w-full pl-10 pr-4 py-1 text-sm border-2 border-[#5DAAE0] rounded-full focus:ring-2 focus:ring-[#5DAAE0] focus:border-[#5DAAE0] outline-none transition-all placeholder:italic placeholder:text-sm">
                    </div>                    
                </div>
                
                <div class="flex justify-end">
                    <button type="button" id="btnRecuperar" class="text-sm text-[#5DAAE0] hover:text-blue-800 font-bold transition-colors">
                        Esqueci minha senha
                    </button>
                </div>
                
                <div class="flex justify-center">
                    <button type="submit" class="flex justify-center items-center w-1/2 gap-2 border-2 border-[#5DAAE0] hover:bg-blue-700 hover:text-white hover:border-blue-700 text-xl text-[#5DAAE0] font-bold py-1 rounded-full transition-colors shadow-md mt-4"> 
                        Acessar              
                    </button> 
                </div>
                          
            </form>
        </div>
    </section>        
</div>

<dialog id="modalEsqueci" class="backdrop:bg-black/50 p-6 rounded-xl shadow-2xl w-11/12 max-w-md m-auto">
    <h3 class="text-xl font-bold text-gray-800 mb-2">Recuperar senha</h3>
    <p class="text-sm text-gray-600 mb-5">Insira seu e-mail para receber as instruções de recuperação:</p>
    
    <input type="email" placeholder="Digite seu e-mail aqui..." required 
        class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-6">
    
    <div class="flex justify-end gap-3">
        <button id="btnFechar" class="px-5 py-2 text-gray-600 font-semibold hover:bg-gray-100 rounded-lg transition-colors">
            CANCELAR
        </button>
        <button id="btnEnviar" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors shadow">
            ENVIAR
        </button>
    </div>
</dialog>

<script src="{% static 'clinica/js/esqueci.js' %}"></script>

{% endblock %}
