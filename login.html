<!DOCTYPE html>
<html lang="pt-bt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MarIA - Medicina Especializada</title>
        <link rel="stylesheet" href="css/login.css">
    </head>
    <body>
        <div class="container">
            <section id="carrosel">
                <img src="img/Carrossel imagem 1.jpg" alt="Carrossel imagem 1">
            </section>
            <section id="login">
                <img src="img/Logo MarIA recortado.jpg" alt="Logo">
                <div class="campo email">
                    <p>Email</p>
                    <input type="email" class="email-icon" placeholder="Insira seu email aqui..." required autofocus>
                </div>
                <div class="campo senha">
                    <p>Senha</p>
                    <input type="password" class="senha-icon" placeholder="Insira sua senha aqui..." required>
                </div>
                <button type="button" id="btnRecuperar" class="esq-btn">Esqueci minha senha</button>
                <button type="submit" class="btn">
                    ENTRAR
                </button>           
            </section>        
        </div>
        <dialog id="modalEsqueci">
            <h3>Recuperar senha</h3>
            <p>Insira seu e-mail para receber as intruções de recuperação:</p>
            <input type="email" placeholder="Digite seu e-mail aqui..." required autofocus>
            <div class="modal-acoes">
                <button id="btnEnviar">ENVIAR</button>
                <button id="btnFechar" class="btn-cancelar">CANCELAR</button>
            </div>
        </dialog>
        <script src="Js/esqueci.js"></script>
    </body>
</html>
