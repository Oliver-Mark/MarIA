<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/selecao.css">
</head>
<body>
    <div class="container">
        <section id="carrosel">
            <img src="img/Carrossel imagem 2.jpeg" alt="Carrossel imagem 2">
        </section>
        <section id="drops">
            <img src="img/Logo MarIA recortado.jpg" alt="Logo">
            <div class="selecao">
                <div class="campo">
                    <label for="clinica">Selecione a clínica:</label><br>
                    <select id="clinica" name="clinica" class="select-estilizado">
                        <option value="" disabled selected>Selecione a clínica</option>
                        <optonn value="centro">Clínica Centro</optonn>
                        <option value="sul">Clínica Sul</option>
                        <option value="leste">Clínica Leste</option>
                        <option value="oeste">Clínica Oeste</option>
                        <option value="norte">Clínica Norte</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="consultorio">Selecione o consultório:</label><br>
                    <select id="consultorio" name="consultorio" class="select-estilizado">
                        <option value="" disabled selected>Selecione o consultório</option>
                        <option value="consultorio1">Consultório 1</option>
                        <option value="consultorio2">Consultório 2</option>
                        <option value="consultorio3">Consultório 3</option>
                        <option value="consultorio4">Consultório 4</option>
                        <option value="consultorio5">Consultório 5</option>
                    </select>
                </div>
            </div>
            <button type="button" class="btn-continuar">
                CONTINUAR
            </button>
        </section>
    </div>
</body>
</html>
