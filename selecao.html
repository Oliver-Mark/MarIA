<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MarIA - Medicina Especializada</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="css/selecao.css">
    </head>
    <body>
        <div class="container">
            <section id="capa">
                <img src="img/Tela selecao.jpeg" alt="seleção" class="img-seleção">
            </section>
        <section id="drops">
            <img src="img/Logo-Maria-preto.png" alt="Logo">
            <div class="cont-selecao">
                <h1>Sede</h1>
                <div class="campo">
                    <label for="clinica">Unidade</label><br>
                    <select id="clinica" name="clinica" class="select-estilizado" required>
                        <option value="" disabled selected>Selecione a clínica</option>
                        <option value="centro">Clínica Centro</option>
                        <option value="sul">Clínica Sul</option>
                        <option value="leste">Clínica Leste</option>
                        <option value="oeste">Clínica Oeste</option>
                        <option value="norte">Clínica Norte</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="consultorio">Consultório</label><br>
                    <select id="consultorio" name="consultorio" class="select-estilizado" required>
                        <option value="" disabled selected>Selecione o consultório</option>
                        <option value="consultorio1">Consultório 1</option>
                        <option value="consultorio2">Consultório 2</option>
                        <option value="consultorio3">Consultório 3</option>
                        <option value="consultorio4">Consultório 4</option>
                        <option value="consultorio5">Consultório 5</option>
                    </select>
                </div>
                <button type="button" class="btn-continuar" onclick="window.location.href='tela_inicial.html'">
                    Acessar
                </button>
            </div>            
        </section>
    </div>
</body>
</html>
